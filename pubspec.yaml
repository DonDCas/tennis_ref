name: tennis_ref
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  animate_do: ^4.2.0
  flutter:
    sdk: flutter
  flutter_glow: ^0.3.2
  flutter_secure_storage: ^10.0.0
  go_router: ^17.0.1
  google_fonts: ^6.1.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  lottie: ^3.3.2
  provider: ^6.1.5+1
  share_plus: ^12.0.1
  universal_html: ^2.3.0
  url_launcher: ^6.3.2
  uuid: ^4.5.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo-2.png"
  web:
    generate: true
    image_path: "assets/images/logo-2.png"

flutter:
  uses-material-design: true
  assets:
    - assets/gif/
    - assets/images/
